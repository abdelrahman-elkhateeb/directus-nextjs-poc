services:
  database:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-directus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-directus}
      POSTGRES_DB: ${POSTGRES_DB:-directus}
    volumes:
      - directus_database:/var/lib/postgresql/data

  cache:
    image: redis:8-alpine
    restart: unless-stopped
    volumes:
      - directus_cache:/data

  directus:
    image: directus/directus:latest
    restart: unless-stopped
    ports:
      - "8055:8055"

    environment:
      SECRET: ${SECRET:-replace-this-with-a-long-random-secret}

      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}

      DB_CLIENT: "pg"
      DB_HOST: "database"
      DB_PORT: "5432"
      DB_DATABASE: ${POSTGRES_DB:-directus}
      DB_USER: ${POSTGRES_USER:-directus}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-directus}

      CACHE_ENABLED: "true"
      CACHE_STORE: "redis"
      REDIS: "redis://cache:6379"
      CACHE_AUTO_PURGE: "true"

      WEBSOCKETS_ENABLED: "true"

    depends_on:
      - database
      - cache

    volumes:
      - directus_uploads:/directus/uploads
      - ./extensions:/directus/extensions

volumes:
  directus_database:
  directus_uploads:
  directus_cache: